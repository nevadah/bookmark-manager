name: Build Extension Artifacts

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -w @bookmark-manager/extension

      - name: Package Chrome extension
        run: cd packages/extension/dist && zip -r ../chrome-extension.zip .

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v5
        with:
          name: chrome-extension
          path: packages/extension/chrome-extension.zip

      - run: npm run build:firefox -w @bookmark-manager/extension

      - name: Package Firefox extension
        run: cd packages/extension/dist-firefox && zip -r ../firefox-extension.xpi .

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v5
        with:
          name: firefox-extension
          path: packages/extension/firefox-extension.xpi
